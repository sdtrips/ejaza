<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إجازة — قريباً</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E✈️%3C/text%3E%3C/svg%3E">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI',Tahoma,sans-serif;
      color:#1a1a2e;
      background:#fff;
      line-height:1.7;
      direction:rtl;
      min-height:100vh;
      display:flex;
      flex-direction:column
    }
    :root{
      --green:#059669;
      --green-dark:#047857;
      --green-light:#d1fae5;
      --red:#dc2626;
      --white:#fff;
      --gray:#6b7280;
      --light:#f0fdf4
    }

    /* ===== HEADER ===== */
    header{
      padding:16px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      top:0;left:0;right:0;
      z-index:10;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(10px)
    }
    .logo{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:1.5rem;
      font-weight:800;
      color:var(--green)
    }
    .logo-icon{
      background:var(--green);
      color:#fff;
      width:36px;height:36px;
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem
    }
    .lang-switch{
      font-size:.85rem;
      color:var(--gray);
      font-weight:600;
      cursor:default
    }

    /* ===== HERO ===== */
    .hero{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:100px 24px 60px;
      background:linear-gradient(135deg,#ecfdf5 0%,#fef2f2 40%,#fff7ed 100%);
      position:relative;
      overflow:hidden
    }
    .hero::before{
      content:"";position:absolute;top:-80px;right:-80px;
      width:280px;height:280px;
      background:radial-gradient(circle,var(--green),transparent 70%);
      opacity:.06;
      border-radius:50%
    }
    .hero::after{
      content:"";position:absolute;bottom:-100px;left:-100px;
      width:350px;height:350px;
      background:radial-gradient(circle,var(--red),transparent 70%);
      opacity:.04;
      border-radius:50%
    }

    .hero-content{position:relative;z-index:2}
    .plane{
      font-size:4rem;
      margin-bottom:12px;
      display:inline-block;
      animation:fly 3s ease-in-out infinite
    }
    @keyframes fly{
      0%,100%{transform:translateY(0) rotate(0)}
      50%{transform:translateY(-18px) rotate(5deg)}
    }

    .hero h1{
      font-size:3.5rem;
      font-weight:900;
      color:var(--green);
      margin-bottom:6px
    }
    .hero .sub{
      font-size:1.2rem;
      color:var(--gray);
      margin-bottom:16px;
      font-weight:500
    }
    .hero .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      background:var(--green-light);
      color:var(--green-dark);
      padding:6px 18px;
      border-radius:50px;
      font-weight:600;
      font-size:.9rem;
      margin-bottom:20px
    }
    .hero .badge .dot{
      width:8px;height:8px;
      border-radius:50%;
      background:var(--green);
      animation:pulse 1.5s infinite
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    .hero .desc{
      font-size:1rem;
      color:var(--gray);
      max-width:400px;
      margin:0 auto 32px;
      line-height:1.8
    }
    .hero .desc span{
      color:var(--green);
      font-weight:600
    }
    .hero .desc .red{color:var(--red)}

    .coming-soon{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:28px;
      flex-wrap:wrap
    }
    .coming-soon .item{
      background:var(--white);
      border-radius:12px;
      padding:10px 22px;
      box-shadow:0 2px 12px rgba(0,0,0,.06);
      text-align:center;
      min-width:70px
    }
    .coming-soon .item .num{
      font-size:1.6rem;
      font-weight:800;
      color:var(--green);
      line-height:1.2
    }
    .coming-soon .item .label{
      font-size:.7rem;
      color:var(--gray);
      font-weight:600;
      text-transform:uppercase
    }

    .notify-form{
      display:flex;
      gap:10px;
      max-width:420px;
      margin:0 auto;
      flex-wrap:wrap;
      justify-content:center
    }
    .notify-form input{
      flex:1;
      min-width:200px;
      padding:12px 18px;
      border:2px solid #e2e8f0;
      border-radius:50px;
      font-size:.95rem;
      font-family:inherit;
      outline:none;
      transition:border .25s
    }
    .notify-form input:focus{border-color:var(--green)}
    .notify-form button{
      background:var(--green);
      color:#fff;
      border:none;
      padding:12px 28px;
      border-radius:50px;
      font-weight:700;
      font-size:.95rem;
      cursor:pointer;
      transition:background .25s
    }
    .notify-form button:hover{background:var(--green-dark)}

    /* ===== SOCIAL ===== */
    .social-links{
      margin-top:32px;
      display:flex;
      justify-content:center;
      gap:16px
    }
    .social-links a{
      width:44px;height:44px;
      border-radius:50%;
      background:var(--white);
      box-shadow:0 2px 12px rgba(0,0,0,.06);
      display:flex;align-items:center;justify-content:center;
      font-size:1.3rem;
      transition:transform .2s;
      text-decoration:none
    }
    .social-links a:hover{transform:translateY(-3px)}

    /* ===== FOOTER ===== */
    footer{
      background:var(--black,#1a1a2e);
      color:#94a3b8;
      text-align:center;
      padding:24px;
      font-size:.82rem
    }
    footer div{font-size:1.1rem;font-weight:800;color:var(--green);margin-bottom:4px}

    /* ===== RESPONSIVE ===== */
    @media(max-width:600px){
      header{padding:14px 16px}
      .hero h1{font-size:2.4rem}
      .plane{font-size:3rem}
      .coming-soon .item{padding:8px 16px;min-width:60px}
      .coming-soon .item .num{font-size:1.3rem}
      .notify-form input{min-width:100%}
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><span class="logo-icon">✈</span> ejaza</div>
    <span class="lang-switch">🌐 قريباً</span>
  </header>

  <section class="hero">
    <div class="hero-content">
      <div class="plane">✈️</div>
      <div class="badge"><span class="dot"></span> قيد الإعداد</div>
      <h1>إجازة</h1>
      <p class="sub">وجهتك القادمة لم تصل بعد، لكنها في الطريق ✨</p>
      <p class="desc">
        نحن نعمل على تصميم تجربة سفر استثنائية.<br>
        <span>عطلات أحلام</span>، <span class="red">عروض حصرية</span>، و <span>وجهات</span> تنتظرك.
      </p>

      <div class="coming-soon">
        <div class="item"><div class="num">∞</div><div class="label">أيام</div></div>
        <div class="item"><div class="num">∞</div><div class="label">ساعة</div></div>
        <div class="item"><div class="num">∞</div><div class="label">دقيقة</div></div>
        <div class="item"><div class="num">∞</div><div class="label">ثانية</div></div>
      </div>

      <p style="font-size:.85rem;color:var(--gray);margin-bottom:20px">🚀 الانطلاقة قريباً — ترقبوا المفاجأة</p>

      <div class="social-links">
        <a href="#" title="تويتر">🐦</a>
        <a href="#" title="انستغرام">📷</a>
        <a href="#" title="واتساب">💬</a>
      </div>
    </div>
  </section>

  <footer>
    <div>✈ ejaza</div>
    <p>© 2026 جميع الحقوق محفوظة</p>
  </footer>

</body>
</html>
